server:
  port: 8081

spring:
  application:
    name: cloud-security-posture-manager

  # ──────────────────────────────────────────
  # H2 In-Memory DataSource (no PostgreSQL needed locally)
  # ──────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:cspm_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console (access at http://localhost:8081/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # ──────────────────────────────────────────
  # JPA / Hibernate
  # ──────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  # ──────────────────────────────────────────
  # Cache — disabled (no Redis needed)
  # ──────────────────────────────────────────
  cache:
    type: none

  # Disable Redis autoconfiguration entirely
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ──────────────────────────────────────────
# JWT Configuration
# ──────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000          # 24 hours in milliseconds

# ──────────────────────────────────────────
# AI Service
# ──────────────────────────────────────────
ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5000/describe}
    timeout: 5000               # ms

# ──────────────────────────────────────────
# Logging
# ──────────────────────────────────────────
logging:
  level:
    com.internship.tool: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
